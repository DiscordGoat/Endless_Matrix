<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070b" />
    <title>Endless Matrix</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      const isLocalDev = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
      const isBuiltDist = window.location.pathname.includes("/dist/");

      if (isLocalDev || isBuiltDist) {
        import("/src/main.js");
      } else {
        window.location.replace(new URL("./dist/", window.location.href));
      }
    </script>
  </body>
</html>
