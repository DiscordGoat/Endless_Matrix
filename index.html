<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070b" />
    <title>Endless Matrix</title>
    <script>
      if (location.hostname.endsWith("github.io") && !location.pathname.includes("/dist/")) {
        const basePath = location.pathname.endsWith("/")
          ? location.pathname
          : location.pathname.replace(/\/[^/]*$/, "/");
        location.replace(`${basePath}dist/${location.search}${location.hash}`);
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
